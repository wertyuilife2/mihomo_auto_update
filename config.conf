# 格式固定为 KEY=VALUE，不要在等号两边加引号。

# 订阅地址。
SUB_URL=
# 自动更新脚本每隔多久检查一次时间。
CHECK_INTERVAL=360
# 两次订阅更新之间的间隔。
UPDATE_INTERVAL=3600


# 以下是 mihomo 相关的配置，通常不需要修改。
## mihomo 可执行文件。默认直接走 PATH 里的 mihomo。
MIHOMO_BIN=mihomo
## mihomo 配置目录，通常里面会有 config.yaml 和 ui/。
MIHOMO_CONFIG_DIR=~/.config/mihomo
## web ui 和 external controller 监听地址，需要和config_override.yaml里external-controller的值一致。
MIHOMO_EXT_CTL=127.0.0.1:9090
## 如果 external controller 配了 secret，就填在这里；没有就留空。
MIHOMO_SECRET=



