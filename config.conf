# 这个文件会被 bash source，可以用 shell 变量和命令替换；赋值时不要在等号两边加空格。

# 订阅地址。
SUB_URL=https://nsu.xsub.icu/nsu/search/1XOhtobAN2gmTIpz?clash=1
# 自动更新脚本每隔多久检查一次时间。
CHECK_INTERVAL=360
# 两次订阅更新之间的间隔。
UPDATE_INTERVAL=3600

# 仓库根目录，所有脚本优先用这个变量拼自己的路径。
REPO_ROOT="$(cd -- "$(dirname -- "${BASH_SOURCE[0]}")" && pwd)"


# 以下是 mihomo 相关的配置，通常不需要修改。
## mihomo 可执行文件。默认直接走 PATH 里的 mihomo。
MIHOMO_BIN=mihomo
## mihomo 配置目录，通常里面会有 config.yaml 和 ui/。
MIHOMO_CONFIG_DIR=~/.config/mihomo
## web ui 和 external controller 监听地址，需要和config_override.yaml里external-controller的值一致。
MIHOMO_EXT_CTL=127.0.0.1:9090
## 如果 external controller 配了 secret，就填在这里；没有就留空。
MIHOMO_SECRET=

## 日志目录和日志文件路径。
LOG_DIR=${REPO_ROOT}/logs
MIHOMO_LOG=${LOG_DIR}/mihomo.log
AUTO_UPDATE_LOG=${LOG_DIR}/auto_update.log
